<!DOCTYPE html>

<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>朝早流程助手 v3.6</title>
<style>
    :root {
      --bg: #edf1f7;
      --card: #f8fafc;
      --text: #223047;
      --muted: #637089;
      --line: #d8dfeb;
      --accent: #6177aa;
      --accent-soft: #dde5f7;
      --good: #5e8f78;
      --warn: #b98563;
      --danger: #b66e77;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 26px 18px 58px;
    }

    .title {
      font-size: 31px;
      font-weight: 800;
      margin: 8px 0 0;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      margin: 4px 0 18px;
      font-variant-numeric: tabular-nums;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 14px 34px rgba(63, 77, 102, 0.10);
      margin-bottom: 16px;
    }

    .step-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .status.waiting {
      color: var(--danger);
      font-weight: 700;
    }

    .step-name {
      font-size: 35px;
      font-weight: 900;
      line-height: 1.2;
      margin: 10px 0 8px;
    }

    .timer {
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 1px;
      margin: 10px 0 6px;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .progress-wrap {
      width: 100%;
      height: 9px;
      background: #d7deef;
      border-radius: 999px;
      overflow: hidden;
      margin: 10px 0 14px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 16px;
      height: 52px;
      min-height: 52px;
      padding: 0 14px;
      font-size: 18px !important;
      line-height: 1 !important;
      font-weight: 800 !important;
      font-family: inherit;
      cursor: pointer;
      background: #dfe6f4;
      color: #425a8a;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    button:hover { opacity: 0.96; box-shadow: 0 10px 22px rgba(66, 90, 138, 0.14); }
    button:active { transform: none; }
    button.primary {
      background: var(--accent);
      color: white;
    }
    button.good {
      background: var(--good);
      color: white;
    }
    button.warn {
      background: var(--warn);
      color: white;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      height: 52px;
      min-height: 52px;
      padding: 0 14px;
      font-size: 18px !important;
      line-height: 1 !important;
      font-weight: 800 !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .list {
      display: grid;
      gap: 11px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: #fff;
    }

    .item.active {
      border-color: var(--accent);
      background: #eef3fb;
    }

    .item.done {
      border-color: #bbf7d0;
      background: #edf7f1;
    }

    .item.skipped {
      border-color: #fed7aa;
      background: #fbf3ec;
    }

    .item-name {
      font-weight: 700;
      font-size: 16px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .finish {
      display: none;
    }

    .finish.show {
      display: block;
    }

    .muted-box {
      background: #f1f4f8;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 12px;
      line-height: 1.6;
      color: var(--muted);
      font-size: 14px;
    }

    .code-note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }


    .mode-toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f1f4f8;
    }

    .mode-toggle-label {
      font-weight: 800;
      color: var(--text);
    }

    .mode-toggle-help {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .mode-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
    }

    .mode-switch input {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .mode-notice {
      color: var(--warn);
      font-weight: 700;
      margin-top: 8px;
    }


    .main-action-zone {
      display: grid;
      gap: 0;
    }

    .secondary-settings-zone {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #e0e6f0;
      border-radius: 16px;
      background: #f3f6fb;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .secondary-zone-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }

    .secondary-zone-note {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .aux-now-playing {
      display: block;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .audio-settings {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .audio-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 46px;
      gap: 10px;
      align-items: center;
    }

    .audio-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .audio-percent {
      text-align: right;
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .audio-settings input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
    }

    .secondary-settings-zone .mode-toggle-row {
      margin-top: 0;
      background: rgba(255,255,255,0.45);
    }

    .secondary-settings-zone .mode-notice {
      margin-top: 10px;
      font-size: 13px;
    }

    .secondary-settings-zone .muted-box {
      margin-top: 12px;
      background: rgba(255,255,255,0.45);
    }

    .timer {
      font-variant-numeric: tabular-nums;
    }

    

    .visually-hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    @media (max-width: 640px) {
      .step-name { font-size: 28px; }
      .timer { font-size: 42px; }
      .controls { grid-template-columns: 1fr; }

      .secondary-settings-zone {
        margin-top: 20px;
        padding: 14px;
      }
      .audio-row {
        grid-template-columns: 1fr auto;
      }
      .audio-row input[type="range"] {
        grid-column: 1 / -1;
      }
      button { font-size: 18px !important; height: 52px; min-height: 52px; }
    }
  </style>
</head>
<body>
<div class="wrap">
<div class="title" id="appTitle">朝早流程助手</div>
<div class="sub version-line" id="appSub">v3.6</div>
<div class="card" id="mainCard"><div class="main-action-zone"><div class="step-top">
<div class="badge" id="stepCount">第 1 / 11 步</div>
<div class="status" id="runStatus">未開始</div>
</div><div class="step-name" id="stepName">刷牙</div><div class="timer" id="timerText">06:00</div><div aria-label="目前步驟進度" class="progress-wrap">
<div class="progress-bar" id="stepProgressBar"></div>
</div><div aria-hidden="true" class="small visually-hidden" id="stepHint">建議時間：6 分鐘。時間到會提醒你，10 秒內唔撳就自動下一步。</div><div class="controls">
<button class="primary" id="startPauseBtn">開始 / 暫停</button>
<button class="good" id="doneBtn">完成，下一步</button>
<button id="prevBtn">上一個</button>
<button class="warn" id="skipBtn">跳過</button>
<button id="restartBtn" style="grid-column: 1 / -1;">重新開始</button>
</div></div><div class="secondary-settings-zone"><div aria-hidden="true" class="small aux-now-playing visually-hidden" id="nowPlaying">目前未播放音樂</div><div class="mode-toggle-row">
<div>
<div class="mode-toggle-label">測試模式</div>
<div aria-hidden="true" class="mode-toggle-help visually-hidden" id="modeHelp">關閉：使用正常時間</div>
</div>
<label class="mode-switch">
<input id="devModeToggle" type="checkbox"/>
<span id="devModeText">關閉</span>
</label>
</div><div class="small mode-notice" id="modeNotice"></div><div class="audio-settings"><div class="audio-row"><span class="audio-label">語音音量</span><input aria-label="語音音量" id="voiceVolume" max="1" min="0" step="0.05" type="range" value="1"/><span class="audio-percent" id="voiceVolumeText">100%</span></div><div class="audio-row"><span class="audio-label">音樂音量</span><input aria-label="音樂音量" id="bgmVolume" max="1" min="0" step="0.05" type="range" value="1"/><span class="audio-percent" id="bgmVolumeText">100%</span></div></div></div></div>
<div class="card">
<div style="font-size:20px;font-weight:800;margin-bottom:10px;">今日流程</div>
<div class="list" id="stepList"></div>

</div>
<div class="card finish" id="finishBox">
<div style="font-size:24px;font-weight:900;margin-bottom:8px;">完成啦 🎉</div>
<div class="small" id="finishText"></div>
</div>
</div>
<!-- 背景音樂播放器：由 JavaScript 控制播放 / 暫停 / 換歌 -->
<audio id="bgm"></audio>
<audio id="voice"></audio>
<script>
    // =========================
    // 1. 配置區
    // =========================
    const APP_NAME = "朝早流程助手";
    const APP_VERSION = "v3.6";

    const DEFAULT_DEV_MODE = false;
    const DEV_STEP_SECONDS = 3;
    const DEV_CONFIRM_SECONDS = 3;
    const DEV_MODE_STORAGE_KEY = 'morning_helper_dev_mode';
    let DEV_MODE = readDevModePreference();

    const UI_TEXT = Object.freeze({
      idle: "未開始",
      running: "進行中",
      paused: "已暫停",
      finished: "已完成",
      musicFailed: "音樂播放失敗：請檢查 audio 文件",
      noMusic: "目前未播放音樂",
      loading: "請稍等"
    });

    // =========================
    // 2. 數據區
    // =========================
    const steps = [
      {
        id: "brush_teeth",
        name: "刷牙",
        duration: 6 * 60,
        voice: "voice/brush_teeth.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "wash_face",
        name: "洗面",
        duration: 5 * 60,
        voice: "voice/wash_face.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "mop_floor",
        name: "拖地",
        duration: 4 * 60,
        voice: "voice/mop_floor.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "boil_eggs_and_drink_water",
        name: "煮鸡蛋 + 饮水",
        duration: 3 * 60,
        voice: "voice/boil_eggs_and_drink_water.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "put_spoon_in_fridge_and_stretch_chest_and_back",
        name: "匙羹放冰箱 + 拉伸胸背",
        duration: 4 * 60,
        voice: "voice/put_spoon_in_fridge_and_stretch_chest_and_back.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "neck_exercise_eye_exercise_and_cold_compress",
        name: "颈部运动 + 眼运动 + 冰敷",
        duration: 8 * 60,
        voice: "voice/neck_exercise_eye_exercise_and_cold_compress.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "fold_blanket_and_get_breakfast",
        name: "褶被 + 攞早餐",
        duration: 3 * 60,
        voice: "voice/fold_blanket_and_get_breakfast.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "eat_breakfast_and_clean_the_table",
        name: "食早餐 + 执台",
        duration: 25 * 60,
        voice: "voice/eat_breakfast_and_clean_the_table.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "use_the_bathroom",
        name: "屙屎",
        duration: 10 * 60,
        voice: "voice/use_the_bathroom.mp3",
        music: { enabled: false, category: null }
      },
      {
        id: "put_on_sunscreen_comb_hair_and_take_photos",
        name: "涂防晒 + 梳头 + 影相",
        duration: 8 * 60,
        voice: "voice/put_on_sunscreen_comb_hair_and_take_photos.mp3",
        music: { enabled: true, category: "game" }
      },
      {
        id: "clean_the_bathroom_change_clothes_and_get_ready_to_go_out",
        name: "洗厕所 + 换衫 + 准备出门嘅嘢",
        duration: 15 * 60,
        voice: "voice/clean_the_bathroom_change_clothes_and_get_ready_to_go_out.mp3",
        music: { enabled: true, category: "anime" }
      }
    ];

    const musicLibrary = {
      anime: [
        "audio/anime/1.mp3",
        "audio/anime/2.mp3",
        "audio/anime/3.mp3",
        "audio/anime/4.mp3",
        "audio/anime/5.mp3",
        "audio/anime/6.mp3",
        "audio/anime/7.mp3",
        "audio/anime/8.mp3",
        "audio/anime/9.mp3",
        "audio/anime/10.mp3",
        "audio/anime/11.mp3",
        "audio/anime/12.mp3",
        "audio/anime/13.mp3",
        "audio/anime/14.mp3"
      ],
      game: [
        "audio/game/1.mp3",
        "audio/game/2.mp3",
        "audio/game/3.mp3",
        "audio/game/4.mp3",
        "audio/game/5.mp3",
        "audio/game/6.mp3",
        "audio/game/7.mp3",
        "audio/game/8.mp3",
        "audio/game/9.mp3"
      ]
    };

    const APP_STATES = Object.freeze({
      IDLE: 'idle',
      STEP_VOICE: 'step_voice',
      RUNNING: 'running',
      PAUSED: 'paused',
      TIMEOUT_PROMPT: 'timeout_prompt',
      WAITING_CONFIRM: 'waiting_confirm',
      FINISHED: 'finished'
    });

    let appState = APP_STATES.IDLE;
    let currentIndex = 0;
    let timeLeft = getStepDuration(0);
    let timerId = null;
    let confirmTimerId = null;
    let confirmLeft = getConfirmSeconds();
    let confirmGeneration = 0;
    let routineStartAt = null;
    let doneMap = Array(steps.length).fill('pending');
    let currentCategory = null;
    let currentTrackSrc = null;
    let lastTrackSrc = null;
    let failedTracks = new Set();
    let musicRetryCount = 0;
    let currentTrackAttemptToken = 0;
    const MAX_MUSIC_RETRY_COUNT = 3;
    let voicePhaseGeneration = 0;

    const STORAGE_KEYS = Object.freeze({
      voiceVolume: 'morning_helper_voice_volume',
      bgmVolume: 'morning_helper_bgm_volume'
    });

    // =========================
    // 3. DOM 元素區
    // =========================
    const appTitle = document.getElementById('appTitle');
    const appSub = document.getElementById('appSub');
    const stepCount = document.getElementById('stepCount');
    const runStatus = document.getElementById('runStatus');
    const stepName = document.getElementById('stepName');
    const timerText = document.getElementById('timerText');
    const stepProgressBar = document.getElementById('stepProgressBar');
    const stepHint = document.getElementById('stepHint');
    const stepList = document.getElementById('stepList');
    const finishBox = document.getElementById('finishBox');
    const finishText = document.getElementById('finishText');
    const nowPlaying = document.getElementById('nowPlaying');
    const devModeToggle = document.getElementById('devModeToggle');
    const devModeText = document.getElementById('devModeText');
    const modeHelp = document.getElementById('modeHelp');
    const modeNotice = document.getElementById('modeNotice');
    const voiceVolume = document.getElementById('voiceVolume');
    const bgmVolume = document.getElementById('bgmVolume');
    const voiceVolumeText = document.getElementById('voiceVolumeText');
    const bgmVolumeText = document.getElementById('bgmVolumeText');
    
    const startPauseBtn = document.getElementById('startPauseBtn');
    const doneBtn = document.getElementById('doneBtn');
    const prevBtn = document.getElementById('prevBtn');
    const skipBtn = document.getElementById('skipBtn');
    const restartBtn = document.getElementById('restartBtn');
    const bgm = document.getElementById('bgm');
    const voice = document.getElementById('voice');

    // beep 用：全局重用同一個 AudioContext
    let beepAudioContext = null;
    let beepAudioContextUnavailable = false;

    // =========================
    // 4. 工具函式區
    // =========================

    function clampVolume(value, fallback) {
      const number = Number.parseFloat(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(1, Math.max(0, number));
    }

    function initVolumeControls() {
      const savedVoiceVolume = clampVolume(localStorage.getItem(STORAGE_KEYS.voiceVolume), 1);
      const savedBgmVolume = clampVolume(localStorage.getItem(STORAGE_KEYS.bgmVolume), 0.45);

      voice.volume = savedVoiceVolume;
      bgm.volume = savedBgmVolume;

      voiceVolume.value = savedVoiceVolume;
      bgmVolume.value = savedBgmVolume;
      voiceVolumeText.textContent = `${Math.round(savedVoiceVolume * 100)}%`;
      bgmVolumeText.textContent = `${Math.round(savedBgmVolume * 100)}%`;

      voiceVolume.addEventListener('input', () => {
        const v = parseFloat(voiceVolume.value);
        voice.volume = v;
        voiceVolumeText.textContent = `${Math.round(v * 100)}%`;
        localStorage.setItem(STORAGE_KEYS.voiceVolume, v);
      });

      bgmVolume.addEventListener('input', () => {
        const v = parseFloat(bgmVolume.value);
        bgm.volume = v;
        bgmVolumeText.textContent = `${Math.round(v * 100)}%`;
        localStorage.setItem(STORAGE_KEYS.bgmVolume, v);
      });
    }

    function readDevModePreference() {
      try {
        const saved = localStorage.getItem(DEV_MODE_STORAGE_KEY);
        if (saved === 'true') return true;
        if (saved === 'false') return false;
      } catch (err) {
        console.log('dev mode preference read failed', err);
      }
      return DEFAULT_DEV_MODE;
    }

    function saveDevModePreference(value) {
      try {
        localStorage.setItem(DEV_MODE_STORAGE_KEY, value ? 'true' : 'false');
      } catch (err) {
        console.log('dev mode preference save failed', err);
      }
    }

    function isModeSwitchAllowedNow() {
      return appState === APP_STATES.IDLE;
    }

    function syncDevModeSwitchUI() {
      devModeToggle.checked = DEV_MODE;
      devModeText.textContent = DEV_MODE ? '開啟' : '關閉';
      modeHelp.textContent = DEV_MODE
        ? `開啟：每步 ${DEV_STEP_SECONDS} 秒，確認 ${DEV_CONFIRM_SECONDS} 秒`
        : '關閉：使用正常時間';
    }

    function showModeNotice(message) {
      modeNotice.textContent = message || '';
    }

    function resetStepStatusesFrom(startIndex) {
      for (let i = startIndex; i < doneMap.length; i += 1) {
        doneMap[i] = 'pending';
      }
    }

    function formatTime(totalSeconds) {
      const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function formatMinutes(totalSeconds) {
      return `${Math.round(totalSeconds / 60)} 分鐘`;
    }

    function clampPercent(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.min(100, Math.max(0, value));
    }

    function getCurrentStepProgressPercent() {
      const totalSeconds = getStepDuration(currentIndex);
      if (!totalSeconds || totalSeconds <= 0) return 0;
      const percent = ((totalSeconds - timeLeft) / totalSeconds) * 100;
      return clampPercent(percent);
    }

    function getStepDuration(index) {
      return DEV_MODE ? DEV_STEP_SECONDS : steps[index].duration;
    }

    function getConfirmSeconds() {
      return DEV_MODE ? DEV_CONFIRM_SECONDS : 10;
    }

    function getContinueSeconds() {
      return DEV_MODE ? DEV_STEP_SECONDS : 30;
    }

    function getModeLabel() {
      return DEV_MODE ? '【測試模式】' : '';
    }

    function setAppState(nextState, options = {}) {
      appState = nextState;
      if (!options.skipUI) updateUI();
    }

    function getBeepAudioContext() {
      if (beepAudioContextUnavailable) return null;
    
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        beepAudioContextUnavailable = true;
        return null;
      }
    
      try {
        if (!beepAudioContext) {
          beepAudioContext = new AudioContextClass();
        }
        return beepAudioContext;
      } catch (e) {
        beepAudioContextUnavailable = true;
        console.log('beep context init failed', e);
        return null;
      }
    }

    function beep() {
      try {
        const ctx = getBeepAudioContext();
        if (!ctx) return;
    
        const playTone = () => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
    
          osc.type = 'sine';
          osc.frequency.value = 880;
          gain.gain.value = 0.05;
    
          osc.connect(gain);
          gain.connect(ctx.destination);
    
          const startAt = ctx.currentTime;
          const stopAt = startAt + 0.18;
    
          osc.start(startAt);
          osc.stop(stopAt);
    
          osc.onended = () => {
            try { osc.disconnect(); } catch (_) {}
            try { gain.disconnect(); } catch (_) {}
          };
        };
    
        if (ctx.state === 'suspended') {
          ctx.resume().then(() => {
            try {
              playTone();
            } catch (e) {
              console.log('beep play failed', e);
            }
          }).catch(err => {
            console.log('beep resume failed', err);
          });
          return;
        }
    
        playTone();
      } catch (e) {
        console.log('beep failed', e);
      }
    }

    function stopSpeech() {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    function clearMainTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function invalidatePendingVoiceCallbacks() {
      voicePhaseGeneration += 1;
      return voicePhaseGeneration;
    }

    function clearConfirmCountdown(options = {}) {
      const { invalidate = true } = options;
      if (invalidate) confirmGeneration += 1;
    
      if (confirmTimerId) {
        clearInterval(confirmTimerId);
        confirmTimerId = null;
      }
      confirmLeft = getConfirmSeconds();
      runStatus.classList.remove('waiting');
    }

    function pickRandomTrack(category, excludedTracks = failedTracks) {
      const list = musicLibrary[category] || [];
      const availableList = list.filter(src => !excludedTracks.has(src));
      if (!availableList.length) return null;
      if (availableList.length === 1) return availableList[0];
    
      let candidate = null;
      let guard = 0;
      do {
        const randomIndex = Math.floor(Math.random() * availableList.length);
        candidate = availableList[randomIndex];
        guard += 1;
      } while (candidate === lastTrackSrc && guard < 20);
    
      return candidate;
    }

    function getTrackDisplayName(src) {
      if (!src) return '目前未播放音樂';
      const fileName = src.split('/').pop() || src;
      return `目前播放：${fileName}`;
    }

    // =========================
    // 5. 音頻控制區
    // =========================
    function stopBgm(message = UI_TEXT.noMusic) {
      currentCategory = null;
      currentTrackSrc = null;
      musicRetryCount = 0;
      currentTrackAttemptToken += 1;
      bgm.pause();
      try { bgm.removeAttribute('src'); } catch (_) {}
      if (typeof bgm.load === 'function') {
        try { bgm.load(); } catch (_) {}
      }
      nowPlaying.textContent = message;
    }

    function resetMusicRetryState() {
      failedTracks = new Set();
      musicRetryCount = 0;
    }

    function handleMusicPlaybackFailure(failedSrc, attemptToken) {
      if (!failedSrc) return;
      if (attemptToken !== currentTrackAttemptToken) return;
    
      console.log('bgm play/load failed', failedSrc);
      failedTracks.add(failedSrc);
    
      if (!currentCategory || musicRetryCount >= MAX_MUSIC_RETRY_COUNT) {
        stopBgm(UI_TEXT.musicFailed);
        return;
      }
    
      const nextTrackSrc = pickRandomTrack(currentCategory, failedTracks);
      if (!nextTrackSrc) {
        stopBgm(UI_TEXT.musicFailed);
        return;
      }
    
      musicRetryCount += 1;
      currentTrackSrc = nextTrackSrc;
      lastTrackSrc = currentTrackSrc;
      playCurrentTrack();
    }

    function playCurrentTrack() {
      if (!currentTrackSrc) return;
    
      const attemptToken = currentTrackAttemptToken + 1;
      currentTrackAttemptToken = attemptToken;
    
      nowPlaying.textContent = getTrackDisplayName(currentTrackSrc);
      bgm.pause();
      bgm.currentTime = 0;
      bgm.src = currentTrackSrc;
      bgm.play().catch(err => {
        console.log('bgm play failed', err);
        handleMusicPlaybackFailure(currentTrackSrc, attemptToken);
      });
    }

    function getStepMusicConfig(step) {
      return step.music || { enabled: false, category: null };
    }

    function playStepAudio(step) {
      resetMusicRetryState();
    
      const musicConfig = getStepMusicConfig(step);
      if (!musicConfig.enabled) {
        stopBgm(UI_TEXT.noMusic);
        return;
      }
    
      const category = musicConfig.category;
      if (!category) {
        stopBgm('呢步嘅音樂分類未設定');
        return;
      }
    
      const list = musicLibrary[category] || [];
      if (!list.length) {
        stopBgm(`呢步嘅音樂分類「${category}」未配置歌曲`);
        return;
      }
    
      currentCategory = category;
      currentTrackSrc = pickRandomTrack(currentCategory);
      if (!currentTrackSrc) {
        stopBgm(`呢步嘅音樂分類「${category}」暫時冇可播放歌曲`);
        return;
      }
    
      musicRetryCount = 1;
      lastTrackSrc = currentTrackSrc;
      playCurrentTrack();
    }

    function playVoice(src, onEnd) {
      let settled = false;
      const finish = () => {
        if (settled) return;
        settled = true;
        voice.onended = null;
        voice.onerror = null;
        if (onEnd) onEnd();
      };
    
      if (!src) {
        finish();
        return;
      }
    
      try {
        voice.pause();
        voice.currentTime = 0;
        voice.src = src;
        voice.onended = finish;
        voice.onerror = err => {
          console.log('voice load failed', err);
          finish();
        };
    
        const playPromise = voice.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(err => {
            console.log('voice play failed', err);
            finish();
          });
        }
      } catch (err) {
        console.log('voice setup failed', err);
        finish();
      }
    }

    function pauseAudio() {
      bgm.pause();
    }

    function resumeAudio() {
      if (!currentTrackSrc) return;
      bgm.play().catch(err => {
        console.log('bgm resume failed', err);
      });
    }

    // =========================
    // 6. 流程控制區
    // =========================
    function pauseEverything(nextState = APP_STATES.PAUSED) {
      clearMainTimer();
      clearConfirmCountdown();
      invalidatePendingVoiceCallbacks();
      pauseAudio();
      voice.pause();
      voice.currentTime = 0;
      stopSpeech();
      setAppState(nextState);
    }

    function startMainTimer() {
      clearMainTimer();
      setAppState(APP_STATES.RUNNING, { skipUI: true });
    
      timerId = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft -= 1;
          timerText.textContent = formatTime(timeLeft);
          updateProgressBar();
        }
    
        if (timeLeft <= 0) {
          timeLeft = 0;
          timerText.textContent = formatTime(timeLeft);
          updateProgressBar();
          handleStepTimeout();
        }
      }, 1000);
    
      updateUI();
    }

    function startConfirmCountdown(targetGeneration) {
      if (appState !== APP_STATES.WAITING_CONFIRM) return;
      if (confirmTimerId) return;
      if (targetGeneration !== confirmGeneration) return;
    
      runStatus.classList.add('waiting');
    
      confirmTimerId = setInterval(() => {
        confirmLeft -= 1;
        updateUI();
    
        if (confirmLeft <= 0) {
          clearConfirmCountdown();
          moveToNextStep(true);
        }
      }, 1000);
    
      updateUI();
    }

    function startCurrentStepSequence() {
      if (!routineStartAt) routineStartAt = Date.now();
    
      clearConfirmCountdown();
      invalidatePendingVoiceCallbacks();
      stopSpeech();
      pauseAudio();
      voice.pause();
      voice.currentTime = 0;
    
      const step = steps[currentIndex];
      const stepIndex = currentIndex;
      const phaseToken = voicePhaseGeneration;
    
      setAppState(APP_STATES.STEP_VOICE);
    
      playVoice(step.voice, () => {
        if (phaseToken !== voicePhaseGeneration) return;
        if (appState !== APP_STATES.STEP_VOICE) return;
        if (currentIndex !== stepIndex) return;
    
        playStepAudio(step);
        startMainTimer();
      });
    }

    function handleStepTimeout() {
      clearMainTimer();
      pauseAudio();
      voice.pause();
      voice.currentTime = 0;
      stopSpeech();
      beep();
      clearConfirmCountdown();
      const thisConfirmGeneration = confirmGeneration;
      const phaseToken = ++voicePhaseGeneration;
      confirmLeft = getConfirmSeconds();
    
      setAppState(APP_STATES.TIMEOUT_PROMPT);
    
      playVoice('voice/time_up.mp3', () => {
        if (phaseToken !== voicePhaseGeneration) return;
        if (appState !== APP_STATES.TIMEOUT_PROMPT) return;
    
        setAppState(APP_STATES.WAITING_CONFIRM);
        startConfirmCountdown(thisConfirmGeneration);
      });
    }

    function continueCurrentStepAfterTimeout() {
      if (appState !== APP_STATES.WAITING_CONFIRM) return;
    
      clearConfirmCountdown();
      invalidatePendingVoiceCallbacks();
      voice.pause();
      voice.currentTime = 0;
      stopSpeech();
      timeLeft += getContinueSeconds();
      resumeAudio();
      startMainTimer();
    }

    function loadStep(index) {
      pauseEverything(APP_STATES.IDLE);
      currentIndex = index;
      timeLeft = getStepDuration(currentIndex);
      finishBox.classList.remove('show');
      updateUI();
      beep();
    }

    function moveToNextStep(autoStart = true, skipped = false) {
      if (skipped) {
        doneMap[currentIndex] = 'skipped';
      } else if (doneMap[currentIndex] === 'pending') {
        doneMap[currentIndex] = 'done';
      }
    
      if (currentIndex < steps.length - 1) {
        loadStep(currentIndex + 1);
        if (autoStart) {
          startCurrentStepSequence();
        }
      } else {
        finishRoutine();
      }
    }

    function finishRoutine() {
      pauseEverything(APP_STATES.FINISHED);
      doneMap[currentIndex] = doneMap[currentIndex] === 'skipped' ? 'skipped' : 'done';
      renderList();
      const totalMinutes = routineStartAt
        ? Math.round((Date.now() - routineStartAt) / 60000)
        : 0;
      finishText.textContent = `你今日完成咗 ${steps.length} 步。由第一次開始計，大約用咗 ${totalMinutes} 分鐘。`;
      finishBox.classList.add('show');
      runStatus.textContent = UI_TEXT.finished;
      runStatus.classList.remove('waiting');
      updateButtonStates();
      beep();
      playVoice('voice/all_done.mp3');
    }

    // =========================
    // 7. UI 更新區
    // =========================
    function applyDevModeText() {
      const modeLabel = getModeLabel();
      document.title = `${APP_NAME} ${APP_VERSION}${modeLabel}`;
      appTitle.textContent = APP_NAME;
      appSub.textContent = `${APP_VERSION}${modeLabel}`;
      syncDevModeSwitchUI();
    }

    function updateProgressBar() {
      if (!stepProgressBar) return;
      stepProgressBar.style.width = `${getCurrentStepProgressPercent()}%`;
    }

    function isInteractionLocked() {
      return appState === APP_STATES.STEP_VOICE || appState === APP_STATES.TIMEOUT_PROMPT;
    }

    function getStartPauseButtonText() {
      switch (appState) {
        case APP_STATES.RUNNING:
          return '暂停';
        case APP_STATES.PAUSED:
          return '继续';
        case APP_STATES.WAITING_CONFIRM:
          return `继续呢一步 +${getContinueSeconds()}秒`;
        case APP_STATES.STEP_VOICE:
        case APP_STATES.TIMEOUT_PROMPT:
          return '请稍等';
        case APP_STATES.FINISHED:
          return '已完成';
        case APP_STATES.IDLE:
        default:
          return '开始';
      }
    }

    function updateStartPauseButtonText() {
      startPauseBtn.textContent = getStartPauseButtonText();
    }

    function updateButtonStates() {
      updateStartPauseButtonText();
    
      if (appState === APP_STATES.FINISHED) {
        startPauseBtn.disabled = true;
        doneBtn.disabled = true;
        prevBtn.disabled = true;
        skipBtn.disabled = true;
        restartBtn.disabled = false;
        return;
      }
    
      if (isInteractionLocked()) {
        startPauseBtn.disabled = true;
        doneBtn.disabled = true;
        prevBtn.disabled = true;
        skipBtn.disabled = true;
        restartBtn.disabled = true;
        return;
      }
    
      startPauseBtn.disabled = false;
      doneBtn.disabled = false;
      skipBtn.disabled = false;
      restartBtn.disabled = false;
      prevBtn.disabled = currentIndex === 0;
    }

    function renderList() {
      stepList.innerHTML = '';
      steps.forEach((step, idx) => {
        const div = document.createElement('div');
        div.className = 'item';
    
        if (idx === currentIndex) div.classList.add('active');
        if (doneMap[idx] === 'done') div.classList.add('done');
        if (doneMap[idx] === 'skipped') div.classList.add('skipped');
    
        let stateText = '未做';
        if (doneMap[idx] === 'done') stateText = '已完成';
        else if (doneMap[idx] === 'skipped') stateText = '已跳過';
        else if (idx === currentIndex) {
          switch (appState) {
            case APP_STATES.STEP_VOICE:
              stateText = '語音提示中';
              break;
            case APP_STATES.RUNNING:
              stateText = '進行中';
              break;
            case APP_STATES.PAUSED:
              stateText = '已暫停';
              break;
            case APP_STATES.TIMEOUT_PROMPT:
              stateText = '時間到提示中';
              break;
            case APP_STATES.WAITING_CONFIRM:
              stateText = `等緊確認（${confirmLeft}）`;
              break;
            case APP_STATES.FINISHED:
              stateText = '已完成';
              break;
            case APP_STATES.IDLE:
            default:
              stateText = '未開始';
              break;
          }
        }
    
        div.innerHTML = `
          <div>
            <div class="item-name">${idx + 1}. ${step.name}</div>
            <div class="item-meta">建議時間：${formatMinutes(getStepDuration(idx))}</div>
          </div>
          <div class="item-meta">${stateText}</div>
        `;
        stepList.appendChild(div);
      });
    }

    function updateStatusText() {
      switch (appState) {
        case APP_STATES.STEP_VOICE:
          runStatus.textContent = '語音提示中';
          runStatus.classList.remove('waiting');
          break;
        case APP_STATES.RUNNING:
          runStatus.textContent = UI_TEXT.running;
          runStatus.classList.remove('waiting');
          break;
        case APP_STATES.PAUSED:
          runStatus.textContent = UI_TEXT.paused;
          runStatus.classList.remove('waiting');
          break;
        case APP_STATES.TIMEOUT_PROMPT:
          runStatus.textContent = '時間到，提示語音中';
          runStatus.classList.add('waiting');
          break;
        case APP_STATES.WAITING_CONFIRM:
          runStatus.textContent = `時間到：${confirmLeft} 秒後自動下一步；撳「開始 / 暫停」可繼續呢一步（+${getContinueSeconds()} 秒）`;
          runStatus.classList.add('waiting');
          break;
        case APP_STATES.FINISHED:
          runStatus.textContent = UI_TEXT.finished;
          runStatus.classList.remove('waiting');
          break;
        case APP_STATES.IDLE:
        default:
          runStatus.textContent = UI_TEXT.idle;
          runStatus.classList.remove('waiting');
          break;
      }
    }

    function updateUI() {
      const step = steps[currentIndex];
      stepCount.textContent = `第 ${currentIndex + 1} / ${steps.length} 步`;
      stepName.textContent = step.name;
      timerText.textContent = formatTime(timeLeft);
      updateProgressBar();
      stepHint.textContent = `建議時間：${formatMinutes(getStepDuration(currentIndex))}。時間到會提醒你，${getConfirmSeconds()} 秒內唔撳就自動下一步。`;
      if (appState !== APP_STATES.FINISHED) {
        finishBox.classList.remove('show');
      }
      updateStatusText();
      updateButtonStates();
      renderList();
    }

    // =========================
    // 8. 事件綁定區
    // =========================
    bgm.addEventListener('ended', () => {
      if (!currentCategory) return;
    
      musicRetryCount = 1;
      currentTrackSrc = pickRandomTrack(currentCategory);
      if (!currentTrackSrc) return;
    
      lastTrackSrc = currentTrackSrc;
      playCurrentTrack();
    });

    bgm.addEventListener('error', () => {
      if (!currentTrackSrc) return;
      handleMusicPlaybackFailure(currentTrackSrc, currentTrackAttemptToken);
    });

    devModeToggle.addEventListener('change', () => {
      const nextMode = devModeToggle.checked;
    
      if (!isModeSwitchAllowedNow()) {
        devModeToggle.checked = DEV_MODE;
        showModeNotice('流程進行中唔會即時切換模式。請先撳「重新開始」，再切換測試模式。');
        return;
      }
    
      DEV_MODE = nextMode;
      saveDevModePreference(DEV_MODE);
      timeLeft = getStepDuration(currentIndex);
      confirmLeft = getConfirmSeconds();
      showModeNotice(DEV_MODE ? '測試模式已開啟。' : '測試模式已關閉。');
      applyDevModeText();
      updateUI();
    });

    startPauseBtn.addEventListener('click', () => {
      switch (appState) {
        case APP_STATES.IDLE:
          startCurrentStepSequence();
          return;
        case APP_STATES.RUNNING:
          pauseEverything(APP_STATES.PAUSED);
          return;
        case APP_STATES.PAUSED:
          resumeAudio();
          startMainTimer();
          return;
        case APP_STATES.WAITING_CONFIRM:
          continueCurrentStepAfterTimeout();
          return;
        default:
          return;
      }
    });

    doneBtn.addEventListener('click', () => {
      if (appState === APP_STATES.STEP_VOICE || appState === APP_STATES.TIMEOUT_PROMPT || appState === APP_STATES.FINISHED) return;
      moveToNextStep(true, false);
    });

    skipBtn.addEventListener('click', () => {
      if (appState === APP_STATES.STEP_VOICE || appState === APP_STATES.TIMEOUT_PROMPT || appState === APP_STATES.FINISHED) return;
      moveToNextStep(true, true);
    });

    prevBtn.addEventListener('click', () => {
      if (appState === APP_STATES.STEP_VOICE || appState === APP_STATES.TIMEOUT_PROMPT || appState === APP_STATES.FINISHED) return;
      if (currentIndex > 0) {
        const targetIndex = currentIndex - 1;
        resetStepStatusesFrom(targetIndex);
        loadStep(targetIndex);
      }
    });

    restartBtn.addEventListener('click', () => {
      if (appState === APP_STATES.STEP_VOICE || appState === APP_STATES.TIMEOUT_PROMPT) return;
    
      pauseEverything(APP_STATES.IDLE);
      currentIndex = 0;
      timeLeft = getStepDuration(0);
      routineStartAt = null;
      doneMap = Array(steps.length).fill('pending');
      finishBox.classList.remove('show');
      updateUI();
    });

    // =========================
    // 9. 初始化區
    // =========================
    initVolumeControls();
    applyDevModeText();
    updateUI();
    </script>
</body>
</html>
